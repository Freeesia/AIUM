name: TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Optional CFBundleShortVersionString. Empty uses the project value, or the tag without a leading v."
        required: false
        type: string
      internal_only:
        description: "Limit the uploaded build to internal TestFlight testing."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags: ["*.*.*", "v*.*.*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload:
    name: Upload AIUM to TestFlight
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    timeout-minutes: 60
    environment: testflight
    env:
      APP_BUNDLE_ID: com.studiofreesia.aium
      WIDGET_BUNDLE_ID: com.studiofreesia.aium.widget
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      GITHUB_OAUTH_CLIENT_ID: ${{ vars.AIUM_GITHUB_OAUTH_CLIENT_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APP_STORE_CERTIFICATE_BASE64: ${{ secrets.APP_STORE_CERTIFICATE_BASE64 }}
      APP_STORE_CERTIFICATE_PASSWORD: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}
      APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_STORE_PROVISIONING_PROFILE_BASE64 }}
      APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      REQUESTED_MARKETING_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.marketing_version || '' }}
      TESTFLIGHT_INTERNAL_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.internal_only || 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

          xcode_major=$(xcodebuild -version | awk '/Xcode/ { split($2, version, "."); print version[1]; exit }')
          if [ -z "$xcode_major" ] || [ "$xcode_major" -lt 26 ]; then
            echo "::error::TestFlight uploads require Xcode 26 or later. Detected: $(xcodebuild -version | head -1)"
            exit 1
          fi

      - name: Validate TestFlight configuration
        run: |
          missing=0
          for name in \
            APPLE_TEAM_ID \
            GITHUB_OAUTH_CLIENT_ID \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_API_PRIVATE_KEY \
            APP_STORE_CERTIFICATE_BASE64 \
            APP_STORE_CERTIFICATE_PASSWORD \
            APP_STORE_PROVISIONING_PROFILE_BASE64 \
            APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64 \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for TestFlight uploads."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare App Store Connect API key
        id: app-store-connect-key
        run: |
          key_dir="$RUNNER_TEMP/private_keys"
          key_path="$key_dir/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          mkdir -p "$key_dir"
          chmod 700 "$key_dir"
          printf '%s\n' "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"

          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Install signing assets
        run: |
          signing_dir="$RUNNER_TEMP/signing"
          keychain_path="$RUNNER_TEMP/aium-testflight.keychain-db"
          certificate_path="$signing_dir/distribution.p12"

          mkdir -p "$signing_dir"
          chmod 700 "$signing_dir"
          printf '%s' "$APP_STORE_CERTIFICATE_BASE64" | /usr/bin/base64 -D > "$certificate_path"
          chmod 600 "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" "$HOME/Library/Keychains/login.keychain-db"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APP_STORE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"

          install_profile() {
            local secret_name="$1"
            local file_name="$2"
            local expected_bundle_id="$3"
            local expected_profile_name="$4"
            local profile_path="$signing_dir/$file_name.mobileprovision"
            local profile_plist="$signing_dir/$file_name.plist"
            local encoded_profile="${!secret_name}"

            printf '%s' "$encoded_profile" | /usr/bin/base64 -D > "$profile_path"
            security cms -D -i "$profile_path" > "$profile_plist"

            local profile_uuid
            local profile_name
            local profile_app_id
            local profile_app_group
            profile_uuid=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$profile_plist")
            profile_name=$(/usr/libexec/PlistBuddy -c "Print :Name" "$profile_plist")
            profile_app_id=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$profile_plist")
            profile_app_group=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.security.application-groups:0" "$profile_plist")

            if [ "$profile_name" != "$expected_profile_name" ]; then
              echo "::error::Unexpected provisioning profile name: $profile_name"
              exit 1
            fi

            if [ "$profile_app_id" != "$APPLE_TEAM_ID.$expected_bundle_id" ]; then
              echo "::error::Unexpected provisioning profile application identifier: $profile_app_id"
              exit 1
            fi

            if [ "$profile_app_group" != "group.com.studiofreesia.aium" ]; then
              echo "::error::Unexpected provisioning profile App Group: $profile_app_group"
              exit 1
            fi

            local installed_path="$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
            mkdir -p "$(dirname "$installed_path")"
            cp "$profile_path" "$installed_path"

            if [ "$file_name" = "app" ]; then
              echo "APP_PROFILE_PATH=$installed_path" >> "$GITHUB_ENV"
            else
              echo "WIDGET_PROFILE_PATH=$installed_path" >> "$GITHUB_ENV"
            fi
          }

          install_profile \
            APP_STORE_PROVISIONING_PROFILE_BASE64 \
            app \
            "$APP_BUNDLE_ID" \
            "AIUM App Store"
          install_profile \
            APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64 \
            widget \
            "$WIDGET_BUNDLE_ID" \
            "AIUM Widget App Store"

          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "APP_PROFILE_NAME=AIUM App Store" >> "$GITHUB_ENV"
          echo "WIDGET_PROFILE_NAME=AIUM Widget App Store" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve version
        id: version
        run: |
          marketing_version="$REQUESTED_MARKETING_VERSION"

          if [ -z "$marketing_version" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            marketing_version="${GITHUB_REF_NAME#v}"
          fi

          if [ -z "$marketing_version" ]; then
            marketing_version=$(xcodebuild \
              -project AIUM.xcodeproj \
              -scheme AIUM \
              -configuration Release \
              -showBuildSettings |
              awk -F'= ' '/ MARKETING_VERSION = / { print $2; exit }')
          fi

          if ! [[ "$marketing_version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::MARKETING_VERSION must be two or three numeric components, for example 1.0 or 1.0.0. Got: $marketing_version"
            exit 1
          fi

          run_number="${GITHUB_RUN_NUMBER:-0}"
          run_attempt="${GITHUB_RUN_ATTEMPT:-1}"
          for part in "$run_number" "$run_attempt"; do
            if ! [[ "$part" =~ ^[0-9]+$ ]]; then
              echo "::error::GitHub Actions build number values must be numeric. run_number=$run_number run_attempt=$run_attempt"
              exit 1
            fi
          done

          build_number="$run_number.$run_attempt"

          echo "marketing-version=$marketing_version" >> "$GITHUB_OUTPUT"
          echo "build-number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          archive_path="$RUNNER_TEMP/AIUM.xcarchive"

          xcodebuild archive \
            -project AIUM.xcodeproj \
            -scheme AIUM \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$archive_path" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            AIUM_PROVISIONING_PROFILE_SPECIFIER="$APP_PROFILE_NAME" \
            AIUM_WIDGET_PROVISIONING_PROFILE_SPECIFIER="$WIDGET_PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build-number }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing-version }}" \
            GITHUB_OAUTH_CLIENT_ID="$GITHUB_OAUTH_CLIENT_ID"

          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Verify archive
        run: |
          app_info="$ARCHIVE_PATH/Products/Applications/AIUM.app/Info.plist"
          widget_info="$ARCHIVE_PATH/Products/Applications/AIUM.app/PlugIns/AIUMWidget.appex/Info.plist"

          if [ ! -f "$app_info" ]; then
            echo "::error::AIUM.app Info.plist was not found in the archive."
            exit 1
          fi

          if [ ! -f "$widget_info" ]; then
            echo "::error::AIUMWidget.appex Info.plist was not found in the archive."
            exit 1
          fi

          app_bundle_id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$app_info")
          widget_bundle_id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$widget_info")
          app_version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_info")
          app_build=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$app_info")

          if [ "$app_bundle_id" != "$APP_BUNDLE_ID" ]; then
            echo "::error::Unexpected app bundle identifier: $app_bundle_id"
            exit 1
          fi

          if [ "$widget_bundle_id" != "$WIDGET_BUNDLE_ID" ]; then
            echo "::error::Unexpected widget bundle identifier: $widget_bundle_id"
            exit 1
          fi

          echo "Prepared $app_bundle_id $app_version ($app_build) with $widget_bundle_id."

      - name: Prepare export options
        run: |
          export_options="$RUNNER_TEMP/TestFlightExportOptions.plist"
          cp Config/TestFlightExportOptions.plist "$export_options"

          if [ "$TESTFLIGHT_INTERNAL_ONLY" != "true" ]; then
            /usr/libexec/PlistBuddy -c "Set :testFlightInternalTestingOnly false" "$export_options"
          fi

          echo "EXPORT_OPTIONS_PLIST=$export_options" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$RUNNER_TEMP/TestFlightExport" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -authenticationKeyPath "${{ steps.app-store-connect-key.outputs.path }}" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Summary
        run: |
          echo "Uploaded AIUM ${{ steps.version.outputs.marketing-version }} (${{ steps.version.outputs.build-number }}) to TestFlight."

      - name: Clean up signing assets
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f "${APP_PROFILE_PATH:-}" "${WIDGET_PROFILE_PATH:-}"
