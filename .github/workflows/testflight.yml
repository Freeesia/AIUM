name: TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload:
    name: Upload AIUM to TestFlight
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    timeout-minutes: 60
    environment: testflight
    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      GITHUB_OAUTH_CLIENT_ID: ${{ vars.AIUM_GITHUB_OAUTH_CLIENT_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APP_STORE_CERTIFICATE_BASE64: ${{ secrets.APP_STORE_CERTIFICATE_BASE64 }}
      APP_STORE_CERTIFICATE_PASSWORD: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}
      APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_STORE_PROVISIONING_PROFILE_BASE64 }}
      APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Write version xcconfig
        run: |
          mkdir -p Config

          MARKETING_VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          printf 'AIUM_MARKETING_VERSION = %s\nAIUM_CURRENT_PROJECT_VERSION = %s\n' \
            "${MARKETING_VERSION}" "${BUILD_NUMBER}" \
            > Config/Version.generated.xcconfig

          echo "MARKETING_VERSION=${MARKETING_VERSION}"
          echo "CURRENT_PROJECT_VERSION=${BUILD_NUMBER}"

      - name: Install signing assets
        run: |
          key_dir="$RUNNER_TEMP/private_keys"
          keychain_path="$RUNNER_TEMP/aium-testflight.keychain-db"
          certificate_path="$RUNNER_TEMP/distribution.p12"
          profile_dir="$HOME/Library/MobileDevice/Provisioning Profiles"

          mkdir -p "$key_dir" "$profile_dir"
          printf '%s\n' "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$key_dir/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APP_STORE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"

          install_profile() {
            local encoded="$1"
            local source_path="$2"
            local plist_path="${source_path%.mobileprovision}.plist"

            printf '%s' "$encoded" | base64 -D > "$source_path"
            security cms -D -i "$source_path" > "$plist_path"

            local uuid
            uuid=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$plist_path")
            local installed_path="$profile_dir/$uuid.mobileprovision"
            cp "$source_path" "$installed_path"
            printf '%s' "$installed_path"
          }

          app_profile_path=$(install_profile "$APP_STORE_PROVISIONING_PROFILE_BASE64" "$RUNNER_TEMP/app.mobileprovision")
          widget_profile_path=$(install_profile "$APP_STORE_WIDGET_PROVISIONING_PROFILE_BASE64" "$RUNNER_TEMP/widget.mobileprovision")

          echo "API_KEY_PATH=$key_dir/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "APP_PROFILE_PATH=$app_profile_path" >> "$GITHUB_ENV"
          echo "WIDGET_PROFILE_PATH=$widget_profile_path" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project AIUM.xcodeproj \
            -scheme AIUM \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AIUM.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            AIUM_PROVISIONING_PROFILE_SPECIFIER="AIUM App Store" \
            AIUM_WIDGET_PROVISIONING_PROFILE_SPECIFIER="AIUM Widget App Store" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" \
            GITHUB_OAUTH_CLIENT_ID="$GITHUB_OAUTH_CLIENT_ID"

      - name: Upload to TestFlight
        run: |
          echo "Uploading MARKETING_VERSION=${{ steps.gitversion.outputs.majorMinorPatch }} CURRENT_PROJECT_VERSION=${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AIUM.xcarchive" \
            -exportPath "$RUNNER_TEMP/TestFlightExport" \
            -exportOptionsPlist Config/TestFlightExportOptions.plist \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APP_PROFILE_PATH" "$WIDGET_PROFILE_PATH"
