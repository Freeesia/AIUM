name: AIUM
options:
  minimumXcodeGenVersion: 2.45.4
  xcodeVersion: "16.0"
  defaultConfig: Release
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: "NO"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    CLANG_ANALYZER_NONNULL: "YES"
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: "YES"
    CLANG_ENABLE_OBJC_ARC: "YES"
    CLANG_ENABLE_OBJC_WEAK: "YES"
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: "YES"
    CLANG_WARN_BOOL_CONVERSION: "YES"
    CLANG_WARN_COMMA: "YES"
    CLANG_WARN_CONSTANT_CONVERSION: "YES"
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: "YES"
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: "YES"
    CLANG_WARN_EMPTY_BODY: "YES"
    CLANG_WARN_ENUM_CONVERSION: "YES"
    CLANG_WARN_INFINITE_RECURSION: "YES"
    CLANG_WARN_INT_CONVERSION: "YES"
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: "YES"
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: "YES"
    CLANG_WARN_OBJC_LITERAL_CONVERSION: "YES"
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: "YES"
    CLANG_WARN_RANGE_LOOP_ANALYSIS: "YES"
    CLANG_WARN_STRICT_PROTOTYPES: "YES"
    CLANG_WARN_SUSPICIOUS_MOVE: "YES"
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: "YES"
    CLANG_WARN__DUPLICATE_METHOD_MATCH: "YES"
    DEVELOPMENT_TEAM: KDJQJM26Y7
    ENABLE_STRICT_OBJC_MSGSEND: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: "YES"
    GCC_WARN_64_TO_32_BIT_CONVERSION: "YES"
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: "YES"
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: "YES"
    GCC_WARN_UNUSED_VARIABLE: "YES"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MTL_FAST_MATH: "YES"
    SDKROOT: iphoneos
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
  configs:
    Debug:
      COPY_PHASE_STRIP: "NO"
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: "YES"
      GCC_DYNAMIC_NO_PIC: "NO"
      GCC_OPTIMIZATION_LEVEL: "0"
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: "YES"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      COPY_PHASE_STRIP: "NO"
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: "NO"
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: -O
      VALIDATE_PRODUCT: "YES"
targets:
  AIUM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/AIUM.xcconfig
      Release: Config/AIUM.xcconfig
    sources:
      - path: AIUM
    dependencies:
      - target: AIUMWidget
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: AIUM/AIUM.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_ASSET_PATHS: ""
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: AIUM/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.studiofreesia.aium
        PRODUCT_NAME: $(TARGET_NAME)
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
  AIUMWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIUMWidget
      - path: AIUM/Models/UsageSnapshot.swift
      - path: AIUM/Storage/UsageStore.swift
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: AIUMWidget/AIUMWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: AIUMWidget/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.studiofreesia.aium.widget
        PRODUCT_NAME: $(TARGET_NAME)
        SKIP_INSTALL: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
  AIUMTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIUMTests
    dependencies:
      - target: AIUM
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.studiofreesia.aium.tests
        PRODUCT_NAME: $(TARGET_NAME)
        SWIFT_EMIT_LOC_STRINGS: "NO"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/AIUM.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AIUM
schemes:
  AIUM:
    build:
      targets:
        AIUM: all
        AIUMWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIUMTests
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
  AIUMWidget:
    build:
      targets:
        AIUMWidget: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
